name: Deploy react app to GitHub Pages
on: push
  
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: print node version
        run: node --version
      - name: install dependencies
        run: npm install
      - name: run tests
        run: npm run test
      - name: completed job
        run: echo "Job completed successfully"  
     

