name: Deploy react app to GitHub Pages
on: [push,workflow_dispatch]
  
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: install dependencies
        run: npm install
      - name: run tests
        run: npm run test
      - name: test job completed
        run: echo "Test job completed successfully"  
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: cache dependencies
        uses: actions/cache@v5
        id: cache
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
      - name: install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm install
      - name: build the app
        run: npm run build
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy test
        run: echo "Deploying to GitHub Pages"
          