name: Greet user
on: [push]
jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: Greet the user
        run: echo "Hello, ${{ github.actor }}!"
      - name: Goodbye message
        run: echo "Goodbye, ${{ github.actor}}!"
      - name: Print Git object
        run: echo "Git object:${{ github.sha }}"